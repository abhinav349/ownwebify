<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1025" />
      <stop offset="100%" stop-color="#0f0a1a" />
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)" />
  <!-- Logo scaled and centered (original 48x48 -> scaled ~7x, centered at 256,256) -->
  <g transform="translate(88, 88) scale(7)">
    <!-- Outer circle (globe) -->
    <circle cx="24" cy="24" r="20" stroke="url(#logo)" stroke-width="2.5" fill="none" />
    <!-- Vertical meridian -->
    <ellipse cx="24" cy="24" rx="8" ry="20" stroke="url(#logo)" stroke-width="2" fill="none" />
    <!-- Horizontal latitude lines -->
    <ellipse cx="24" cy="16" rx="16" ry="4" stroke="url(#logo)" stroke-width="1.5" fill="none" />
    <ellipse cx="24" cy="32" rx="16" ry="4" stroke="url(#logo)" stroke-width="1.5" fill="none" />
    <!-- Orbital arc -->
    <path d="M 8 12 A 24 24 0 0 1 40 36" stroke="url(#logo)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <!-- Small dot at orbit end -->
    <circle cx="40" cy="36" r="3" fill="url(#logo)" />
  </g>
</svg>
